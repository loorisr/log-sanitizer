<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Sanitizer & Anonymizer</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-input: #020617;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #334155;
            --font-mono: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            font-size: 0.7rem;
            background: var(--border);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Layout */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        @media (max-width: 768px) {
            main { flex-direction: column; overflow-y: auto; }
            body { overflow: auto; }
        }

        /* Sidebar */
        .controls {
            width: 300px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .controls { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
        }

        .control-group h3 {
            font-size: 0.875rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .rule-toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            font-size: 0.9rem;
            user-select: none;
        }

        .rule-toggle input {
            cursor: pointer;
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background-color: var(--border);
        }

        @media (max-width: 1024px) {
            .editor-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
        }

        .panel {
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel-header {
            padding: 0.5rem 1rem;
            background-color: var(--bg-panel);
            font-size: 0.75rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            flex: 1;
            background: var(--bg-input);
            color: var(--text-main);
            border: none;
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: #475569;
        }

        .copy-btn {
            background-color: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .copy-btn:hover { background-color: var(--accent-hover); }
        .copy-btn.success { background-color: var(--success); color: white; }

        .stats {
            font-family: var(--font-mono);
            font-size: 0.7rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span>&lt;/&gt; LogSanitizer</span>
            <span class="badge">Local Only</span>
        </div>
        <div style="font-size: 0.8rem; color: var(--text-dim);">
            Private & Secure Anonymization
        </div>
    </header>

    <main>
        <aside class="controls">
            <div class="control-group">
                <h3>Sanitization Rules</h3>
                
                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="mac"> MAC Addresses
                </label>
                
                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="ipv4"> IPv4 Addresses
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="ipv6"> IPv6 Addresses
                </label>
                
                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="domain"> Domains
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="email"> Email Addresses
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="uuid"> UUIDs / GUIDs
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="creditcard"> Credit Cards
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="phone"> Phone Numbers
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="password"> Passwords & Secrets
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="auth"> Bearer Tokens
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="apikey"> Cloud API Keys
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="ssid"> SSIDs
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="username"> Usernames
                </label>

                <label class="rule-toggle">
                    <input type="checkbox" checked data-rule="filepath"> User File Paths
                </label>
            </div>

            <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-dim); line-height: 1.4;">
                <p>🔒 <strong>Privacy:</strong> All processing is done locally in your browser. No data is sent to any server.</p>
            </div>
        </aside>

        <section class="editor-container">
            <div class="panel">
                <div class="panel-header">
                    <span>INPUT (DIRTY)</span>
                    <span class="stats" id="input-stats">0 chars | 0 lines</span>
                </div>
                <textarea id="input-logs" placeholder="Paste your raw logs here..."></textarea>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span>OUTPUT (CLEAN)</span>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span class="stats" id="output-stats">0 chars | 0 lines</span>
                        <button class="copy-btn" id="copy-btn">Copy Clean Logs</button>
                    </div>
                </div>
                <textarea id="output-logs" readonly placeholder="Cleaned logs will appear here automatically..."></textarea>
            </div>
        </section>
    </main>

    <script>
        /**
         * REGEX CONFIGURATION
         * The order in this array is CRITICAL for preventing overlap issues.
         */
        const RULES = [
            {
                id: 'mac',
                pattern: /\b([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})\b/g,
                replacement: '[MAC_ADDR]'
            },
            {
                id: 'ipv4',
                pattern: /\b(?:\d{1,3}\.){3}\d{1,3}\b/g,
                replacement: '[IP_V4]'
            },
            {
                id: 'ipv6',
                pattern: /(?:\b(?:[0-9a-f]{1,4}:){7}[0-9a-f]{1,4}\b)|(?:\b(?:[0-9a-f]{1,4}:)*(?:[0-9a-f]{1,4})?::(?:[0-9a-f]{1,4}(?::[0-9a-f]{1,4})*)?\b)/gi,
                replacement: '[IP_V6]'
            },
            {
                id: 'domain',
                pattern: /(?<=^|[^a-zA-Z0-9-])(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,}(?=[^a-zA-Z0-9-]|$)/gi,
                replacement: '[DOMAIN]'
            },
            {
                id: 'email',
                pattern: /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b/g,
                replacement: '[EMAIL]'
            },
            {
                id: 'uuid',
                pattern: /\b[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}\b/g,
                replacement: '[UUID]'
            },
            {
                id: 'creditcard',
                pattern: /\b(?:\d[ -]*?){13,16}\b/g,
                replacement: '[CREDIT_CARD]'
            },
            {
                id: 'phone',
                pattern: /(?:\b|\+|\()(?:\d{1,3}[-.\s]?)?\(?[2-9]\d{2}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b|\b0\d{8,10}\b|\+\d{7,15}\b/g,
                replacement: '[PHONE_NUMBER]'
            },
            {
                id: 'password',
                pattern: /((?:"?)(?:password|passwd|pwd|secret|api[_-]?key|session[_-]?token|access[_-]?token|auth[_-]?token|password[_-]?hash|[a-z0-9_.-]+[_-](?:key|token))(?:"?))\s*([:=])\s*(?:"(?:.*?)"|'(?:.*?)'|`(?:.*?)`|(?:[^\s,;&}\]]+))/gi,
                replacement: '$1$2[REDACTED_SECRET]'
            },
            {
                id: 'auth',
                pattern: /Bearer\s[a-zA-Z0-9\-\._~\+\/]+=*/g,
                replacement: 'Bearer [REDACTED_TOKEN]'
            },
            {
                id: 'apikey',
                pattern: /\b((?:AKIA|ASIA|ABIA|ACCA)[0-9A-Z]{10,30})|(sk_live_[0-9a-zA-Z]{24,})\b/g,
                replacement: '[CLOUD_API_KEY]'
            },
            {
                id: 'ssid',
                pattern: /\b(ssid)\s*([:=])\s*(?:"(?:.*?)"|'(?:.*?)'|`(?:.*?)`|(?:[^\s,;&}]+))/gi,
                replacement: '$1$2[REDACTED_SSID]'
            },
            {
                id: 'username',
                pattern: /\b(user|username|usr|login)\s*([:=])\s*(?:"(?:.*?)"|'(?:.*?)'|`(?:.*?)`|(?:[^\s,;&}]+))/gi,
                replacement: '$1$2[REDACTED_USER]'
            },
            {
                id: 'filepath',
                pattern: /(\/(?:Users|home)\/)([^/]+)/g,
                replacement: '$1[REDACTED_USER]'
            }
        ];

        const inputEl = document.getElementById('input-logs');
        const outputEl = document.getElementById('output-logs');
        const copyBtn = document.getElementById('copy-btn');
        const inputStats = document.getElementById('input-stats');
        const outputStats = document.getElementById('output-stats');
        const checkboxes = document.querySelectorAll('input[data-rule]');

        /**
         * Core processing function
         */
        function processLogs() {
            let text = inputEl.value;

            // Process rules in defined order
            RULES.forEach(rule => {
                const cb = document.querySelector(`input[data-rule="${rule.id}"]`);
                if (cb && cb.checked) {
                    text = text.replace(rule.pattern, rule.replacement);
                }
            });

            outputEl.value = text;
            updateStats();
        }

        /**
         * Update character and line counters
         */
        function updateStats() {
            const getStats = (val) => {
                const chars = val.length;
                const lines = val ? val.split('\n').length : 0;
                return `${chars.toLocaleString()} chars | ${lines.toLocaleString()} lines`;
            };

            inputStats.textContent = getStats(inputEl.value);
            outputStats.textContent = getStats(outputEl.value);
        }

        /**
         * Debounce to keep UI responsive with large inputs
         */
        let debounceTimer;
        const debounceProcess = () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(processLogs, 150);
        };

        // Event Listeners
        inputEl.addEventListener('input', debounceProcess);
        
        checkboxes.forEach(cb => {
            cb.addEventListener('change', processLogs);
        });

        copyBtn.addEventListener('click', () => {
            if (!outputEl.value) return;
            
            navigator.clipboard.writeText(outputEl.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = 'Copied!';
                copyBtn.classList.add('success');
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.classList.remove('success');
                }, 2000);
            });
        });

        // Initialize with sample if needed or just empty
        processLogs();
    </script>
</body>
</html>
